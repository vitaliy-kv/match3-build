<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>KLO Match3</title>

    <link rel="preload" href="Build/build.wasm.br" as="fetch" type="application/wasm" crossorigin>
    <link rel="preload" href="Build/build.data.br" as="fetch" crossorigin>
    <link rel="preload" href="Build/build.framework.js.br" as="script">

    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #unity-canvas {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: auto;
        height: 100vh;
        aspect-ratio: 9 / 16;
        background: #231F20;
      }
    </style>
  </head>

  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/build.loader.js"></script>

    <script>
      let unityInstance = null;

      window.NativeBridge = {

        closeApp: function () {
          console.log("closeApp called");

          if (window.Android && window.Android.closeApp) {
            window.Android.closeApp();
            return;
          }

          if (window.webkit?.messageHandlers?.closeApp) {
            window.webkit.messageHandlers.closeApp.postMessage(null);
            return;
          }

          console.warn("closeApp: no native bridge");
        },

        logEvent: function (data) {
          try {
            const json = JSON.stringify(data);

            if (window.Android && window.Android.logEvent) {
              window.Android.logEvent(json);
              return;
            }

            if (window.webkit?.messageHandlers?.logEvent) {
              window.webkit.messageHandlers.logEvent.postMessage(json);
              return;
            }

            console.warn("logEvent: no native bridge");
          } catch (e) {
            console.error("logEvent error:", e);
          }
        },

        requestJwt: function () {
          if (window.Android && window.Android.requestJwt) {
            window.Android.requestJwt();
            return;
          }

          if (window.webkit?.messageHandlers?.requestJwt) {
            window.webkit.messageHandlers.requestJwt.postMessage(null);
            return;
          }

          console.warn("requestJwt: no native bridge");
        }
      };

      window.deliverJwtToUnity = function(token) {

        if (!unityInstance) {
          console.warn("Unity not ready yet (JWT skipped)");
          return;
        }

        console.log("Delivering JWT to Unity");

        unityInstance.SendMessage(
          "WebAppHandler",
          "HandleJwtToken",
          token
        );
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.head.appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/build.data.br",
        frameworkUrl: "Build/build.framework.js.br",
        codeUrl: "Build/build.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "KLO",
        productName: "klo_match3",
        productVersion: "1.0.0",
        devicePixelRatio: 1
      }).then((instance) => {

        unityInstance = instance;
        console.log("Unity loaded");

        setTimeout(() => {
          NativeBridge.requestJwt();
        }, 500);

      }).catch((message) => {
        alert(message);
      });

    </script>
  </body>
</html>
